[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "lumensim"                 # import name stays `lumen`; PyPI name avoids collisions
version = "0.0.0"
description = "Differentiable, GPU-parallel contact & coupling solver for a continuum instrument in a deformable lumen"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "Colin Son" }]
keywords = ["differentiable-physics", "contact", "cosserat-rod", "endovascular",
            "surgical-simulation", "newton", "warp"]
dependencies = ["numpy>=1.24"]

[project.optional-dependencies]
# The Layer-0 solver runs on the Newton engine (doc §3.2: build on Newton/Warp,
# do not write an engine). Newton/Warp execute on BOTH CPU and CUDA — one engine,
# no separate CPU fallback. Newton has no stable PyPI release yet; install it from
# source alongside this:  pip install git+https://github.com/newton-physics/newton
solver = ["warp-lang>=1.14"]      # + newton (from git, see above)
dev = ["pytest>=7", "warp-lang>=1.14"]

[project.urls]
Homepage = "https://github.com/txmed82/lumen"

[tool.setuptools.packages.find]
include = ["lumen*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
