name: Bug report
description: Something doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! For **security or patient-data** concerns, do not file
        a public issue — see [SECURITY.md](../blob/master/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: A clear, minimal description.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest snippet/command that triggers it.
      render: python
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      description: Output of `python -m lumen.hardware`
      placeholder: '{"device": "cpu", ...}'
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python, and versions of numpy / warp-lang / newton.
    validations:
      required: true
