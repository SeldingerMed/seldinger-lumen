name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Install Newton engine (pinned)
        # Newton has no PyPI release and is pre-1.0; TubeVBDSolver forks a SolverVBD
        # internal, so we pin a known-good commit (upstream HEAD drifts and breaks
        # the override). Best-effort: if the pin can't install, Newton-backed tests
        # skip rather than reds CI. Bump NEWTON_REF deliberately, re-running tests.
        continue-on-error: true
        env:
          NEWTON_REF: 6dfe7303d9ca50f7505cac31bee9885c813d89d7
        run: pip install "git+https://github.com/newton-physics/newton@${NEWTON_REF}"
      - name: Tests
        run: pytest -q
      - name: Firewall (no CathSim, no patient data)
        run: python tools/check_firewall.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .

  docs:
    name: docs build + links
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/configure-pages@v6
        id: pages
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate source and generated Pages links
        run: >-
          python tools/check_docs_site.py
          --repo-root .
          --site-dir ./_site
          --base-path "${{ steps.pages.outputs.base_path }}"
          --require-site-path index.html
          --require-site-path comparison.html
          --require-site-path EPISODE_SCHEMA.html
          --require-site-path SOLVER_SUPPORT.html
          --require-site-path assets/logo.svg
          --require-site-path assets/pipeline.svg
          --require-site-path assets/demo/nav_bifurcation.gif
          --require-site-path assets/demo/fluoro_bifurcation.gif
