name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install package + dev deps
        run: pip install -e ".[dev]"
      - name: Install Newton engine (best effort)
        # Newton has no PyPI release; install from source. If upstream main is
        # broken, the Newton-backed tests skip cleanly rather than failing CI.
        continue-on-error: true
        run: pip install "git+https://github.com/newton-physics/newton"
      - name: Tests
        run: pytest -q
      - name: Firewall (no CathSim, no patient data)
        run: python tools/check_firewall.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
