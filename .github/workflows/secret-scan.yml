name: secret-scan

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed for commit-range scanning

      # The official gitleaks-action requires a paid licence for org-owned
      # repos. The gitleaks CLI itself is MIT, so we install the binary and
      # verify its checksum instead.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          ARCHIVE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL -o "$ARCHIVE" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ARCHIVE}"
          echo "${GITLEAKS_SHA256}  ${ARCHIVE}" | sha256sum -c -
          sudo tar -xz -C /usr/local/bin -f "$ARCHIVE" gitleaks
          rm -f "$ARCHIVE"
          gitleaks version

      # Scans only the commits introduced by this PR/push. Pre-existing
      # history is not re-litigated on every run; see .gitleaks.toml for
      # documented allowlists.
      - name: Scan new commits
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ZERO=0000000000000000000000000000000000000000
          RANGE=""
          if [ "$EVENT" = "pull_request" ]; then
            RANGE="${BASE_SHA}..${HEAD_SHA}"
          elif [ "$BEFORE_SHA" != "$ZERO" ] && [ -n "$BEFORE_SHA" ]; then
            RANGE="${BEFORE_SHA}..${AFTER_SHA}"
          fi

          if [ -n "$RANGE" ]; then
            echo "Scanning commit range: $RANGE"
            gitleaks detect --source . --config .gitleaks.toml \
              --redact --no-banner --exit-code 1 --log-opts="$RANGE"
          else
            echo "No prior ref (new branch); scanning working tree only."
            gitleaks detect --source . --config .gitleaks.toml \
              --redact --no-banner --exit-code 1 --no-git
          fi
