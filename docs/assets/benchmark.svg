<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 330" width="920" height="330" role="img" aria-label="benchmark: safe vs unsafe success">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1018"/><stop offset="1" stop-color="#10161f"/>
    </linearGradient>
    <style>
      text{font-family:'Inter','Helvetica Neue',Arial,sans-serif}
      .title{fill:#f2f6fa;font-size:18px;font-weight:700}
      .ax{fill:#7c8da0;font-size:12.5px;font-weight:500}
      .task{fill:#c6d2de;font-size:14px;font-weight:600}
      .pen{fill:#f59e0b;font-size:12px;font-weight:600;font-family:'SF Mono',ui-monospace,Menlo,monospace}
      .val{fill:#0c1018;font-size:13px;font-weight:700}
    </style>
  </defs>

  <rect width="920" height="330" rx="20" fill="url(#bg)"/>
  <text x="40" y="48" class="title">Reaching the target isn't enough — reaching it without scraping the wall is</text>

  <!-- gridlines + y labels (0, .5, 1.0) baseline y=270 top y=90 -->
  <g stroke="#1c2735" stroke-width="1">
    <line x1="120" y1="270" x2="820" y2="270"/>
    <line x1="120" y1="180" x2="820" y2="180"/>
    <line x1="120" y1="90"  x2="820" y2="90"/>
  </g>
  <g class="ax" text-anchor="end">
    <text x="106" y="274">0.0</text>
    <text x="106" y="184">0.5</text>
    <text x="106" y="94">1.0</text>
  </g>

  <!-- groups: tube(easy) center 270, stenotic(med) 470, branch(hard) 670 -->
  <!-- safe = teal, unsafe = amber. bar w=52. full-height(1.0)=180 -->
  <g>
    <!-- nav_tube: safe 1.0 -->
    <rect x="218" y="90"  width="52" height="180" rx="5" fill="#2dd4bf"/>
    <text x="244" y="110" class="val" text-anchor="middle">1.0</text>
    <!-- unsafe 0 (stub) -->
    <rect x="278" y="266" width="52" height="4" rx="2" fill="#f59e0b" opacity="0.4"/>
    <text x="274" y="296" class="task" text-anchor="middle">nav_tube</text>
    <text x="274" y="314" class="ax"   text-anchor="middle">easy · pen 0.000</text>

    <!-- nav_stenotic: safe 1.0 -->
    <rect x="418" y="90"  width="52" height="180" rx="5" fill="#2dd4bf"/>
    <text x="444" y="110" class="val" text-anchor="middle">1.0</text>
    <rect x="478" y="266" width="52" height="4" rx="2" fill="#f59e0b" opacity="0.4"/>
    <text x="474" y="296" class="task" text-anchor="middle">nav_stenotic</text>
    <text x="474" y="314" class="ax"   text-anchor="middle">medium · pen 0.000</text>

    <!-- nav_tree_branch: safe 0, unsafe 1.0 -->
    <rect x="618" y="266" width="52" height="4" rx="2" fill="#2dd4bf" opacity="0.4"/>
    <rect x="678" y="90"  width="52" height="180" rx="5" fill="#f59e0b"/>
    <text x="704" y="110" class="val" text-anchor="middle">1.0</text>
    <text x="674" y="296" class="task" text-anchor="middle">nav_tree_branch</text>
    <text x="674" y="314" class="pen"  text-anchor="middle">hard · pen 1.325</text>
  </g>

  <!-- legend -->
  <g transform="translate(40 72)">
    <rect x="0"   y="-12" width="14" height="14" rx="3" fill="#2dd4bf"/>
    <text x="22"  y="0" class="ax">safe success</text>
    <rect x="170" y="-12" width="14" height="14" rx="3" fill="#f59e0b"/>
    <text x="192" y="0" class="ax">reached only by breaching the wall</text>
  </g>
</svg>
