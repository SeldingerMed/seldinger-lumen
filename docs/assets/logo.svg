<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" role="img" aria-label="lumen">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1018"/>
      <stop offset="1" stop-color="#10161f"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.6" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#a7f3e6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="900" height="260" rx="22" fill="url(#panel)"/>

  <!-- mark: tube cross-section the wire threads through -->
  <g transform="translate(130 130)">
    <!-- vessel wall rings -->
    <circle r="74" fill="none" stroke="#1c2735" stroke-width="14"/>
    <circle r="74" fill="none" stroke="#243446" stroke-width="2"/>
    <circle r="46" fill="none" stroke="#2a3c50" stroke-width="2" stroke-dasharray="3 6"/>
    <!-- lumen glow -->
    <circle r="40" fill="url(#glow)" opacity="0.35"/>
    <!-- guidewire threading through -->
    <path d="M -96 58 C -48 30, -30 -36, 6 -34 C 44 -32, 40 40, 86 28"
          fill="none" stroke="url(#wire)" stroke-width="7" stroke-linecap="round" filter="url(#soft)" opacity="0.55"/>
    <path d="M -96 58 C -48 30, -30 -36, 6 -34 C 44 -32, 40 40, 86 28"
          fill="none" stroke="url(#wire)" stroke-width="5" stroke-linecap="round"/>
    <!-- tip -->
    <circle cx="86" cy="28" r="6" fill="#a7f3e6"/>
    <circle cx="86" cy="28" r="13" fill="url(#glow)"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(258 0)" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
    <text x="0" y="142" font-size="92" font-weight="700" letter-spacing="-3" fill="#f2f6fa">lumen</text>
    <text x="4" y="182" font-size="21" font-weight="500" letter-spacing="0.5" fill="#7c8da0">a slender device threading a soft, moving tube</text>
    <text x="4" y="212" font-size="15" font-weight="500" letter-spacing="1.5" fill="#2dd4bf">DIFFERENTIABLE · GPU-PARALLEL · CONTACT PHYSICS</text>
  </g>
</svg>
